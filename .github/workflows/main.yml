name: HireMind AI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Check for Type Errors & Build
        run: npm run build

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so the scanner has a reference point

      - name: Trufflehog Secret Scan
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true # Keeps the pipeline green if the tool has a technical hiccup
        with:
          path: ./
          base: "" 
          head: HEAD
          extra_args: --debug